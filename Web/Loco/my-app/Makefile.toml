[tasks.clean]
  args      = ["clean"]
  command   = "cargo"
  workspace = false

[tasks.clippy]
  args      = ["clippy"]
  command   = "cargo"
  workspace = false

[tasks.check]
  args      = ["check"]
  command   = "cargo"
  workspace = false

[tasks.format]
  args          = ["fmt"]
  command       = "cargo"
  dependencies  = ["check", "clippy"]
  install_crate = "rustfmt"
  workspace     = false

[tasks.build]
  args         = ["build", "--profile", "dev"]
  command      = "cargo"
  dependencies = ["format"]
  workspace    = false

[tasks.release]
  args         = ["build", "--profile", "release"]
  command      = "cargo"
  dependencies = ["format"]
  workspace    = false

[tasks.test]
  args         = ["test"]
  command      = "cargo"
  dependencies = ["format"]
  workspace    = false

[tasks.watch-run]
  # `cargo install cargo-watch`로 설치
  command       = "cargo"
  args          = ["watch", "-x", "run"]
  install_crate = "cargo-watch"
  dependencies  = ["format"]
  workspace     = false

[tasks.run]
  args         = ["run"]
  command      = "cargo"
  dependencies = ["format"]
  workspace    = false
