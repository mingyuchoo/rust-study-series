[workspace]
  members = [
    "crates/proto",
    "crates/common",
    "crates/server",
    "crates/client",
  ]
  resolver = "2"

  [workspace.package]
    authors = ["Mingyu Choo <mingyuchoo@gmail.com>"]
    edition = "2024"
    version = "0.1.0"

  [workspace.dependencies]
    # Proto dependencies
    prost             = "0.14.3"
    prost-types       = "0.14.3"
    tonic             = "0.14.5"
    tonic-build       = "0.14.5"
    tonic-prost       = "0.14.5"
    tonic-prost-build = "0.14.5"

    # Common dependencies
    thiserror          = "2.0.18"
    tokio              = {features = ["macros", "rt-multi-thread"], version = "1.50.0"}
    tokio-stream       = "0.1.18"
    tracing            = "0.1.44"
    tracing-subscriber = {features = ["env-filter"], version = "0.3.19"}

    # Dev dependencies
    criterion = {features = ["html_reports"], version = "0.8.2"}

[profile.dev]
  codegen-units = 256
  debug         = true
  incremental   = true
  opt-level     = 1

[profile.release]
  codegen-units = 1
  debug         = false
  lto           = "thin"
  opt-level     = 3
