[package]
  description = "Tauri desktop wrapper for the eval-harness web SPA"
  edition     = "2021"
  license     = "BSD-3-Clause"
  name        = "eval-harness-desktop"
  version     = "0.1.0"

[[bin]]
  name = "eval-harness-desktop"
  path = "src/main.rs"

[build-dependencies]
  tauri-build = {features = [], version = "2"}

[dependencies]
  tauri = {features = [], version = "2"}
  # eval-harness 크레이트를 라이브러리로 재사용 (web/desktop_helpers 모듈 접근).
  eval-harness   = {path = "../crates/eval-harness"}
  data-scenarios = {path = "../crates/data-scenarios"}
