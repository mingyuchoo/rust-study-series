[profile.dev]
  codegen-units = 256
  debug         = true
  incremental   = true
  opt-level     = 1

[profile.release]
  codegen-units = 1
  debug         = false
  lto           = "thin"
  opt-level     = 3

[package]
  authors = ["Mingyu Choo <mingyuchoo@gmail.com>"]
  edition = "2024"
  name    = "wasm-lib"
  version = "0.1.0"

[lib]
  crate-type = ["cdylib"]

[dependencies]
  js-sys         = "0.3"
  serde          = { version = "1", features = ["derive"] }
  serde_json     = "1"
  sha2           = "0.10"
  wasm-bindgen   = "0.2.95"
