[profile.dev]
  codegen-units = 256
  debug         = true
  incremental   = true
  opt-level     = 1

[profile.release]
  codegen-units = 1
  debug         = false
  lto           = "thin"
  opt-level     = 3
  panic         = "abort"
  strip         = "symbols"

[package]
  authors = ["Mingyu Choo <mingyuchoo@gmail.com>"]
  edition = "2021"
  name    = "wasm-lib"
  version = "0.1.0"

[lib]
  crate-type = ["cdylib"]

[dependencies]
  argon2       = "0.5"
  getrandom    = { version = "0.2", features = ["js"] }
  rand_core    = { version = "0.6", features = ["getrandom"] }
  uuid         = { version = "1", features = ["v4"] }
  js-sys       = "0.3"
  serde        = { version = "1", features = ["derive"] }
  serde_json   = "1"
  wasm-bindgen = "0.2.95"
