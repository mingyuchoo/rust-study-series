<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Conway's Game of Life - WASM</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background-color: #1a1a2e;
        color: #e0e0e0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      h1 {
        margin-bottom: 16px;
        font-size: 1.5rem;
        color: #e94560;
      }

      #controls {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 12px;
      }

      button {
        padding: 8px 20px;
        border: none;
        border-radius: 4px;
        background-color: #e94560;
        color: white;
        font-size: 0.9rem;
        cursor: pointer;
        transition: background-color 0.2s;
      }

      button:hover {
        background-color: #c73e54;
      }

      label {
        font-size: 0.85rem;
      }

      input[type="range"] {
        width: 100px;
      }

      #fps-display {
        font-size: 0.8rem;
        color: #888;
      }

      canvas {
        background-color: #16213e;
        cursor: crosshair;
      }
    </style>
  </head>
  <body>
    <h1>Conway's Game of Life</h1>
    <div id="controls">
      <button id="play-pause">⏸ 일시정지</button>
      <label>
        속도:
        <input id="speed" type="range" min="1" max="30" value="10" />
      </label>
      <span id="fps-display">10 fps</span>
    </div>
    <canvas id="game-of-life-canvas"></canvas>
    <script src="./bootstrap.js"></script>
  </body>
</html>
