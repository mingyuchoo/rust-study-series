networks:
  docker-link:
    external: true

services:
  surrealdb:
    image: "surrealdb/surrealdb:latest"
    container_name: surrealdb
    command:
      - start
      - --log=trace
      - --username=root
      - --password=root
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
    restart: always
    healthcheck:
      test: ["CMD", "/surreal", "is-ready", "--endpoint", "ws://localhost:8000"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 5s
    ports:
      - "8000:8000"
    environment:
      - SURREALDB_URL=localhost:8000
      - SURREALDB_USERNAME=root
      - SURREALDB_PASSWORD=root
      - SURREALDB_NS=namespace
      - SURREALDB_DB=database
    networks:
      - docker-link
