syntax = "proto3";

package blog;

service BlogService {
  // Authentication
  rpc Register (RegisterRequest) returns (AuthResponse);
  rpc Login (LoginRequest) returns (AuthResponse);

  // Profile
  rpc GetMyProfile (GetMyProfileRequest) returns (UserResponse);
  rpc UpdateProfile (UpdateProfileRequest) returns (UserResponse);
  rpc ChangePassword (ChangePasswordRequest) returns (ChangePasswordResponse);
  rpc DeleteMyAccount (DeleteMyAccountRequest) returns (DeleteResponse);

  // Posts
  rpc CreatePost (CreatePostRequest) returns (PostResponse);
  rpc GetPost (GetPostRequest) returns (PostResponse);
  rpc ListPosts (ListPostsRequest) returns (ListPostsResponse);
  rpc SearchPosts (SearchPostsRequest) returns (ListPostsResponse);
  rpc UpdatePost (UpdatePostRequest) returns (PostResponse);
  rpc DeletePost (DeletePostRequest) returns (DeleteResponse);

  // Comments
  rpc CreateComment (CreateCommentRequest) returns (CommentResponse);
  rpc ListComments (ListCommentsRequest) returns (ListCommentsResponse);
  rpc UpdateComment (UpdateCommentRequest) returns (CommentResponse);
  rpc DeleteComment (DeleteCommentRequest) returns (DeleteResponse);

  // Admin
  rpc ListUsers (ListUsersRequest) returns (ListUsersResponse);
  rpc GetUser (GetUserRequest) returns (UserResponse);
  rpc UpdateUserRole (UpdateUserRoleRequest) returns (UserResponse);
  rpc DeleteUser (DeleteUserRequest) returns (DeleteResponse);
  rpc UpdatePostVisibility (UpdatePostVisibilityRequest) returns (PostResponse);

  // System
  rpc GetVersion (VersionRequest) returns (VersionResponse);
}

// --- Authentication ---

message RegisterRequest {
  string username = 1;
  string email = 2;
  string password = 3;
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message AuthResponse {
  string token = 1;
  UserInfo user = 2;
}

message UserInfo {
  string id = 1;
  string username = 2;
  string email = 3;
  string created_at = 4;
  string role = 5;
  string bio = 6;
  string website = 7;
  string theme = 8;
}

// --- Posts ---

message CreatePostRequest {
  string token = 1;
  string title = 2;
  string content = 3;
  string visibility = 4;
}

message GetPostRequest {
  string id = 1;
  string token = 2;
}

message ListPostsRequest {
  uint32 page = 1;
  uint32 per_page = 2;
  string token = 3;
  string filter = 4; // "": all visible, "public": public only, "mine": own only
}

message UpdatePostRequest {
  string token = 1;
  string id = 2;
  string title = 3;
  string content = 4;
  string visibility = 5;
}

message DeletePostRequest {
  string token = 1;
  string id = 2;
}

message Post {
  string id = 1;
  string title = 2;
  string content = 3;
  UserInfo author = 4;
  string created_at = 5;
  string updated_at = 6;
  uint32 comment_count = 7;
  string visibility = 8;
}

message PostResponse {
  Post post = 1;
}

message ListPostsResponse {
  repeated Post posts = 1;
  uint32 total = 2;
}

// --- Comments ---

message CreateCommentRequest {
  string token = 1;
  string post_id = 2;
  string content = 3;
  string visibility = 4;
}

message ListCommentsRequest {
  string post_id = 1;
  string token = 2;
}

message UpdateCommentRequest {
  string token = 1;
  string id = 2;
  string content = 3;
  string visibility = 4;
}

message DeleteCommentRequest {
  string token = 1;
  string id = 2;
}

message Comment {
  string id = 1;
  string content = 2;
  UserInfo author = 3;
  string post_id = 4;
  string created_at = 5;
  string visibility = 6;
}

message CommentResponse {
  Comment comment = 1;
}

message ListCommentsResponse {
  repeated Comment comments = 1;
}

// --- Admin ---

message ListUsersRequest {
  string token = 1;
  uint32 page = 2;
  uint32 per_page = 3;
}

message ListUsersResponse {
  repeated UserInfo users = 1;
  uint32 total = 2;
}

message GetUserRequest {
  string token = 1;
  string user_id = 2;
}

message UserResponse {
  UserInfo user = 1;
}

message UpdateUserRoleRequest {
  string token = 1;
  string user_id = 2;
  string role = 3;
}

message DeleteUserRequest {
  string token = 1;
  string user_id = 2;
}

message UpdatePostVisibilityRequest {
  string token = 1;
  string post_id = 2;
  string visibility = 3;
}

// --- Profile ---

message GetMyProfileRequest {
  string token = 1;
}

message UpdateProfileRequest {
  string token = 1;
  string bio = 2;
  string website = 3;
  string theme = 4;
}

message ChangePasswordRequest {
  string token = 1;
  string current_password = 2;
  string new_password = 3;
}

message ChangePasswordResponse {
  bool success = 1;
  string message = 2;
}

message DeleteMyAccountRequest {
  string token = 1;
  string password = 2;
}

// --- Search ---

message SearchPostsRequest {
  string query = 1;
  uint32 page = 2;
  uint32 per_page = 3;
  string token = 4;
}

// --- Common ---

message DeleteResponse {
  bool success = 1;
}

message VersionRequest {}

message VersionResponse {
  string version = 1;
}
