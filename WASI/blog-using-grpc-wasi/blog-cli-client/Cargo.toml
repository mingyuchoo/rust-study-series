[package]
name = "blog-cli-client"
version.workspace = true
edition.workspace = true

[[bin]]
name = "blog-cli-client"
path = "src/main.rs"

[dependencies]
tonic = "0.12"
prost = "0.13"
tokio = { version = "1", features = ["full"] }
anyhow = "1"
clap = { version = "4", features = ["derive", "env"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
dirs = "6"

[build-dependencies]
tonic-build = "0.12"
