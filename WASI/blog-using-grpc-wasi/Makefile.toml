[config]
  default_to_workspace = false

[env]
  WASM_TARGET = "wasm32-wasip2"
  WASM_OUTPUT = "target/${WASM_TARGET}/release/blog_component.wasm"

  # ─── default ──────────────────────────────────────────────────────────────────

[tasks.default]
  alias = "build"

  # ─── setup ────────────────────────────────────────────────────────────────────

[tasks.setup]
  args        = ["target", "add", "${WASM_TARGET}"]
  command     = "rustup"
  description = "Install required targets and tools"

  # ─── database ─────────────────────────────────────────────────────────────────

[tasks.start-db]
  args = [
    "run",
    "--rm",
    "--name",
    "surrealdb",
    "-p",
    "8000:8000",
    "surrealdb/surrealdb:v1",
    "start",
    "--username",
    "root",
    "--password",
    "root",
    "--bind",
    "0.0.0.0:8000",
    "memory",
  ]
  command = "docker"
  description = "Start SurrealDB (in-memory)"

[tasks.start-db-file]
  args = [
    "run",
    "--rm",
    "--name",
    "surrealdb",
    "-p",
    "8000:8000",
    "-v",
    "${CARGO_MAKE_WORKING_DIRECTORY}/blog.db:/data/blog.db",
    "surrealdb/surrealdb:v1",
    "start",
    "--username",
    "root",
    "--password",
    "root",
    "--bind",
    "0.0.0.0:8000",
    "file:/data/blog.db",
  ]
  command = "docker"
  description = "Start SurrealDB (file-based persistent storage)"

[tasks.stop-db]
  args        = ["stop", "surrealdb"]
  command     = "docker"
  description = "Stop SurrealDB"

  # ─── build ────────────────────────────────────────────────────────────────────

[tasks.build-component]
  args = [
    "build",
    "--target",
    "${WASM_TARGET}",
    "--release",
    "-p",
    "blog-component",
  ]
  command = "cargo"
  description = "Build the WASI 0.2 component (wasm32-wasip2)"

[tasks.build-server]
  args        = ["build", "--release", "-p", "blog-server"]
  command     = "cargo"
  description = "Build the gRPC server"

[tasks.build-cli-client]
  args        = ["build", "--release", "-p", "blog-cli-client"]
  command     = "cargo"
  description = "Build the gRPC client"

[tasks.build]
  clear = true
  dependencies = [
    "build-component",
    "build-server",
    "build-cli-client",
    "build-web-client",
  ]
  description = "Build all targets"

  # ─── run ──────────────────────────────────────────────────────────────────────

[tasks.run-server]
  args         = ["run", "--release", "-p", "blog-server"]
  command      = "cargo"
  dependencies = ["build-component"]
  description  = "Run the gRPC server (builds WASM component first)"
  [tasks.run-server.env]
    BLOG_WASM_PATH = "${WASM_OUTPUT}"

[tasks.run-cli-client]
  description = "Run the gRPC CLI client (pass args after --)"
  script      = ["cargo run --release -p blog-cli-client -- ${@}"]

[tasks.run-cli-client-dev]
  description = "Run the gRPC CLI client in debug mode (pass args after --)"
  script      = ["cargo run -p blog-cli-client -- ${@}"]

[tasks.run-web-client]
  args        = ["run", "dev"]
  command     = "bun"
  cwd         = "blog-web-client"
  description = "Run the web client dev server (Vite)"

[tasks.run-web-client-prod]
  args        = ["run", "start"]
  command     = "bun"
  cwd         = "blog-web-client"
  description = "Run the web client production server (requires build-web-client)"

  # ─── check / lint / fmt ───────────────────────────────────────────────────────

[tasks.check-server]
  args    = ["check", "-p", "blog-server"]
  command = "cargo"

[tasks.check-cli-client]
  args    = ["check", "-p", "blog-cli-client"]
  command = "cargo"

[tasks.check-component]
  args    = ["check", "--target", "${WASM_TARGET}", "-p", "blog-component"]
  command = "cargo"

[tasks.check]
  dependencies = ["check-server", "check-cli-client", "check-component"]
  description  = "Check all crates for errors"

[tasks.fmt]
  args        = ["fmt", "--all"]
  command     = "cargo"
  description = "Format all code"

[tasks.clippy]
  args = [
    "clippy",
    "-p",
    "blog-server",
    "-p",
    "blog-cli-client",
    "--",
    "-D",
    "warnings",
  ]
  command = "cargo"
  description = "Run clippy on native crates"

  # ─── web client ───────────────────────────────────────────────────────────────

[tasks.install-web-client]
  args        = ["install"]
  command     = "bun"
  cwd         = "blog-web-client"
  description = "Install web client dependencies"

[tasks.build-web-client]
  args         = ["run", "build"]
  command      = "bun"
  cwd          = "blog-web-client"
  dependencies = ["install-web-client"]
  description  = "Build the web client (SvelteKit production build)"

  # ─── clean ────────────────────────────────────────────────────────────────────

[tasks.clean]
  args        = ["clean"]
  command     = "cargo"
  description = "Clean build artifacts"
