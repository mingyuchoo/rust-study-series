[package]
name = "greeting-server"
version.workspace = true
edition.workspace = true

[[bin]]
name = "greeting-server"
path = "src/main.rs"

[dependencies]
tonic = "0.12"
prost = "0.13"
tokio = { version = "1", features = ["full"] }
wasmtime = { version = "29", features = ["component-model"] }
wasmtime-wasi = "29"
anyhow = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[build-dependencies]
tonic-build = "0.12"
